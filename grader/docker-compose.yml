services:
  grader:
    build:
      context: .
      args:
        DOCKER_GID: "${DOCKER_GID}"   
    container_name: deveduhub_grader
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket mount
      - /tmp:/tmp
    environment:
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s