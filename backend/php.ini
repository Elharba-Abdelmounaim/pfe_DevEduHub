; ── DevEduHub PHP Configuration ──────────────────────────────────────────────

[PHP]
; Limits
memory_limit            = 256M
max_execution_time      = 60
max_input_time          = 60
post_max_size           = 50M
upload_max_filesize     = 50M

; Error handling (disable display in production — log only)
display_errors          = Off
display_startup_errors  = Off
log_errors              = On
error_log               = /var/log/php/error.log
error_reporting         = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Date
date.timezone           = UTC

; ── OPcache (critical for production performance) ─────────────────────────────
[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 10000
opcache.revalidate_freq        = 0       ; 0 = never revalidate in production
opcache.fast_shutdown          = 1
opcache.validate_timestamps    = 0       ; 0 = trust cached bytecode (production)
opcache.save_comments          = 1       ; required by Laravel annotations
